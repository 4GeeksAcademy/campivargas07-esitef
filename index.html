<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESITEF — Prototipo para revisión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inconsolata', monospace;
      background: #fafafa;
      color: #111;
      min-height: 100dvh;
      padding: 48px 24px;
    }
    main { max-width: 560px; margin: 0 auto; }
    h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 300;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      background: #fdf5d3;
      color: #b89b14;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 50px;
      margin-bottom: 28px;
    }
    p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 32px; }
    ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #fff;
      border: 1px solid #eaeaea;
      border-radius: 12px;
      color: #111;
      text-decoration: none;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    a:hover { border-color: #e3203a; box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
    a span { color: #999; font-size: 12px; }
    .primary { border-color: #e3203a33; }
    .primary strong { color: #e3203a; }
  </style>
</head>
<body>
  <main>
    <span class="badge">Borrador · revisión</span>
    <h1>ESITEF Online</h1>
    <p>Prototipo HTML para aprobación. Selecciona una pantalla:</p>

      <li><a href="formaciones-online.html">Formaciones online <span>formaciones-online.html</span></a></li>
      <li><a href="mentorias.html">Mentorías <span>mentorias.html</span></a></li>

      <li><a href="la-escuela.html">La escuela <span>la-escuela.html</span></a></li>
      <li><a href="presencial-ejemplo.html">Presencial <span>presencial-ejemplo.html</span></a></li>
    </ul>
  </main>
